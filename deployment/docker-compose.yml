version: '3.8'

# VoiceHelpDeskAI - Complete Docker Compose Stack
# Includes: App, Redis, Nginx, Prometheus, Grafana
# Supports: GPU acceleration, monitoring, load balancing

networks:
  voicehelpdesk-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  monitoring-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  # Application data
  app-data:
    driver: local
  app-logs:
    driver: local
  app-models:
    driver: local
  app-uploads:
    driver: local
  
  # Database
  redis-data:
    driver: local
  
  # Monitoring
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  
  # Nginx
  nginx-logs:
    driver: local
  nginx-cache:
    driver: local

services:
  # =============================================================================
  # Main Application Service
  # =============================================================================
  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      target: runtime
      args:
        - PYTHON_VERSION=3.11
        - DEBIAN_VERSION=bookworm-slim
    image: voicehelpdeskai:latest
    container_name: voicehelpdesk-app
    restart: unless-stopped
    
    # GPU Support (uncomment if GPU available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    
    environment:
      # Application
      - VOICEHELPDESK_ENV=production
      - VOICEHELPDESK_LOG_LEVEL=INFO
      - VOICEHELPDESK_DEBUG=false
      - VOICEHELPDESK_WORKERS=4
      
      # Database
      - VOICEHELPDESK_DATABASE_URL=sqlite:///app/data/voicehelpdesk.db
      - VOICEHELPDESK_REDIS_URL=redis://redis:6379/0
      
      # AI Models
      - VOICEHELPDESK_MODEL_PATH=/app/models
      - VOICEHELPDESK_WHISPER_MODEL=base
      - VOICEHELPDESK_PIPER_MODEL=en_US-amy-medium
      
      # Audio Processing
      - VOICEHELPDESK_AUDIO_SAMPLE_RATE=16000
      - VOICEHELPDESK_AUDIO_CHANNELS=1
      - VOICEHELPDESK_VAD_ENABLED=true
      - VOICEHELPDESK_NOISE_REDUCTION=true
      
      # API Configuration
      - VOICEHELPDESK_API_HOST=0.0.0.0
      - VOICEHELPDESK_API_PORT=8000
      - VOICEHELPDESK_API_WORKERS=4
      - VOICEHELPDESK_API_TIMEOUT=300
      
      # Security
      - VOICEHELPDESK_SECRET_KEY=${VOICEHELPDESK_SECRET_KEY:-change-me-in-production}
      - VOICEHELPDESK_CORS_ORIGINS=["http://localhost:3000", "https://yourdomain.com"]
      - VOICEHELPDESK_RATE_LIMIT_ENABLED=true
      
      # Monitoring
      - VOICEHELPDESK_METRICS_ENABLED=true
      - VOICEHELPDESK_PROMETHEUS_PORT=8001
      - VOICEHELPDESK_TELEMETRY_ENABLED=true
      
      # Celery
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CELERY_WORKER_CONCURRENCY=4
      - CELERY_TASK_ALWAYS_EAGER=false
    
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
      - app-models:/app/models
      - app-uploads:/app/uploads
      - ./config:/app/config:ro
    
    ports:
      - "8000:8000"  # Main API
      - "8001:8001"  # Metrics endpoint
    
    networks:
      - voicehelpdesk-network
      - monitoring-network
    
    depends_on:
      - redis
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    labels:
      - "com.voicehelpdesk.service=app"
      - "com.voicehelpdesk.environment=production"

  # =============================================================================
  # Celery Worker Service
  # =============================================================================
  celery-worker:
    image: voicehelpdeskai:latest
    container_name: voicehelpdesk-celery-worker
    restart: unless-stopped
    
    command: ["celery", "-A", "voicehelpdeskai.workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    
    environment:
      - VOICEHELPDESK_ENV=production
      - VOICEHELPDESK_LOG_LEVEL=INFO
      - VOICEHELPDESK_DATABASE_URL=sqlite:///app/data/voicehelpdesk.db
      - VOICEHELPDESK_REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CELERY_WORKER_CONCURRENCY=4
    
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
      - app-models:/app/models
      - app-uploads:/app/uploads
    
    networks:
      - voicehelpdesk-network
    
    depends_on:
      - redis
      - app
    
    healthcheck:
      test: ["CMD", "celery", "-A", "voicehelpdeskai.workers.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # Celery Beat Scheduler
  # =============================================================================
  celery-beat:
    image: voicehelpdeskai:latest
    container_name: voicehelpdesk-celery-beat
    restart: unless-stopped
    
    command: ["celery", "-A", "voicehelpdeskai.workers.celery_app", "beat", "--loglevel=info"]
    
    environment:
      - VOICEHELPDESK_ENV=production
      - VOICEHELPDESK_LOG_LEVEL=INFO
      - VOICEHELPDESK_DATABASE_URL=sqlite:///app/data/voicehelpdesk.db
      - VOICEHELPDESK_REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    
    networks:
      - voicehelpdesk-network
    
    depends_on:
      - redis
      - app

  # =============================================================================
  # Celery Flower Monitoring
  # =============================================================================
  celery-flower:
    image: voicehelpdeskai:latest
    container_name: voicehelpdesk-celery-flower
    restart: unless-stopped
    
    command: ["celery", "-A", "voicehelpdeskai.workers.celery_app", "flower", "--port=5555"]
    
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    
    ports:
      - "5555:5555"
    
    networks:
      - voicehelpdesk-network
    
    depends_on:
      - redis
      - celery-worker

  # =============================================================================
  # Redis Service
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: voicehelpdesk-redis
    restart: unless-stopped
    
    command: >
      redis-server 
      --appendonly yes 
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --save 900 1
      --save 300 10
      --save 60 10000
    
    environment:
      - REDIS_REPLICATION_MODE=master
    
    volumes:
      - redis-data:/data
      - ./config/redis.conf:/etc/redis/redis.conf:ro
    
    ports:
      - "6379:6379"
    
    networks:
      - voicehelpdesk-network
      - monitoring-network
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    labels:
      - "com.voicehelpdesk.service=redis"

  # =============================================================================
  # Nginx Reverse Proxy
  # =============================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: voicehelpdesk-nginx
    restart: unless-stopped
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
      - nginx-cache:/var/cache/nginx
      - app-uploads:/var/www/uploads:ro
    
    ports:
      - "80:80"
      - "443:443"
    
    networks:
      - voicehelpdesk-network
    
    depends_on:
      - app
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    labels:
      - "com.voicehelpdesk.service=nginx"

  # =============================================================================
  # Prometheus Monitoring
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: voicehelpdesk-prometheus
    restart: unless-stopped
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--log.level=info'
    
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    
    ports:
      - "9090:9090"
    
    networks:
      - monitoring-network
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    labels:
      - "com.voicehelpdesk.service=prometheus"

  # =============================================================================
  # Grafana Dashboards
  # =============================================================================
  grafana:
    image: grafana/grafana:10.1.0
    container_name: voicehelpdesk-grafana
    restart: unless-stopped
    
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
      - GF_SERVER_ROOT_URL=http://localhost:3000/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_DATABASE_TYPE=sqlite3
      - GF_DATABASE_PATH=/var/lib/grafana/grafana.db
      - GF_SESSION_PROVIDER=memory
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
    
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    
    ports:
      - "3000:3000"
    
    networks:
      - monitoring-network
    
    depends_on:
      - prometheus
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    labels:
      - "com.voicehelpdesk.service=grafana"

  # =============================================================================
  # Node Exporter for System Metrics
  # =============================================================================
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: voicehelpdesk-node-exporter
    restart: unless-stopped
    
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    
    ports:
      - "9100:9100"
    
    networks:
      - monitoring-network
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # Redis Exporter for Redis Metrics
  # =============================================================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: voicehelpdesk-redis-exporter
    restart: unless-stopped
    
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_EXPORTER_LOG_FORMAT=json
    
    ports:
      - "9121:9121"
    
    networks:
      - voicehelpdesk-network
      - monitoring-network
    
    depends_on:
      - redis
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # Log Aggregation (Optional)
  # =============================================================================
  loki:
    image: grafana/loki:2.9.0
    container_name: voicehelpdesk-loki
    restart: unless-stopped
    
    command: -config.file=/etc/loki/local-config.yaml
    
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    
    ports:
      - "3100:3100"
    
    networks:
      - monitoring-network
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # Log Collection Agent
  # =============================================================================
  promtail:
    image: grafana/promtail:2.9.0
    container_name: voicehelpdesk-promtail
    restart: unless-stopped
    
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - app-logs:/var/log/app:ro
      - nginx-logs:/var/log/nginx:ro
      - /var/log:/var/log:ro
    
    command: -config.file=/etc/promtail/config.yml
    
    networks:
      - monitoring-network
    
    depends_on:
      - loki

# =============================================================================
# Additional Services for Development
# =============================================================================

  # Adminer for Database Management (Development only)
  adminer:
    image: adminer:4.8.1
    container_name: voicehelpdesk-adminer
    restart: unless-stopped
    
    environment:
      - ADMINER_DEFAULT_SERVER=redis
      - ADMINER_DESIGN=hydra
    
    ports:
      - "8080:8080"
    
    networks:
      - voicehelpdesk-network
    
    profiles:
      - dev
    
    depends_on:
      - redis

  # Mailhog for Email Testing (Development only)
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: voicehelpdesk-mailhog
    restart: unless-stopped
    
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    
    networks:
      - voicehelpdesk-network
    
    profiles:
      - dev