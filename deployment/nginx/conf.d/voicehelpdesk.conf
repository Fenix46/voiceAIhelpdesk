# VoiceHelpDeskAI Main Server Configuration

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    # Security headers
    add_header X-Robots-Tag "noindex, nofollow, nosnippet, noarchive" always;
    
    # Health check endpoint (no redirect)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;
    
    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    
    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # Rate limiting
    limit_req zone=general burst=50 nodelay;
    limit_conn addr 10;
    
    # Root directory
    root /var/www/html;
    index index.html;
    
    # ==========================================================================
    # Static Files and Frontend
    # ==========================================================================
    
    # Frontend application (React SPA)
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            
            # CORS for fonts and assets
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range";
        }
        
        # HTML files - no cache
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }
    }
    
    # User uploads
    location /uploads/ {
        alias /var/www/uploads/;
        
        # Security
        location ~* \.(php|pl|py|jsp|asp|sh|cgi)$ {
            deny all;
        }
        
        # Cache uploaded files
        expires 30d;
        add_header Cache-Control "public";
        
        # File size limits
        client_max_body_size 100M;
    }
    
    # ==========================================================================
    # API Routes
    # ==========================================================================
    
    # Main API
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://voicehelpdesk_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 300s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Cache certain endpoints
        location ~ ^/api/(health|version|status)$ {
            proxy_cache api_cache;
            proxy_cache_valid 200 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            
            proxy_pass http://voicehelpdesk_app;
        }
    }
    
    # WebSocket connections
    location /ws/ {
        limit_req zone=websocket burst=10 nodelay;
        
        proxy_pass http://voicehelpdesk_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket specific settings
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        proxy_buffering off;
        
        # Keep-alive
        proxy_set_header Connection "keep-alive";
        proxy_cache_bypass $http_upgrade;
    }
    
    # File upload endpoint
    location /api/upload/ {
        limit_req zone=upload burst=5 nodelay;
        client_max_body_size 100M;
        client_body_timeout 300s;
        
        proxy_pass http://voicehelpdesk_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Large file upload settings
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # ==========================================================================
    # Monitoring and Admin
    # ==========================================================================
    
    # Health check
    location /health {
        access_log off;
        proxy_pass http://voicehelpdesk_app/health;
        proxy_set_header Host $host;
    }
    
    # Metrics endpoint (restricted)
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        proxy_pass http://voicehelpdesk_metrics/metrics;
        proxy_set_header Host $host;
    }
    
    # Grafana dashboard
    location /grafana/ {
        # Basic auth or IP restriction recommended
        # auth_basic "Monitoring Dashboard";
        # auth_basic_user_file /etc/nginx/.htpasswd;
        
        proxy_pass http://grafana/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Grafana specific headers
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }
    
    # Prometheus (internal only)
    location /prometheus/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        proxy_pass http://prometheus/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Flower (Celery monitoring)
    location /flower/ {
        # Basic auth recommended
        # auth_basic "Task Monitoring";
        # auth_basic_user_file /etc/nginx/.htpasswd;
        
        proxy_pass http://flower/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # ==========================================================================
    # Security
    # ==========================================================================
    
    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block common exploit attempts
    location ~* "(eval\()" {
        deny all;
        access_log off;
    }
    
    location ~* "(127\.0\.0\.1)" {
        deny all;
        access_log off;
    }
    
    location ~* "([a-z0-9]{2000})" {
        deny all;
        access_log off;
    }
    
    location ~* "(javascript\:)(.*)(\;)" {
        deny all;
        access_log off;
    }
    
    location ~* "(base64_encode)(.*)(\()" {
        deny all;
        access_log off;
    }
    
    location ~* "(GLOBALS|REQUEST)(=|\[|%)" {
        deny all;
        access_log off;
    }
    
    location ~* "(<|%3C).*script.*(>|%3)" {
        deny all;
        access_log off;
    }
    
    location ~ "\.php$" {
        deny all;
        access_log off;
    }
    
    # Block requests with no user agent
    if ($http_user_agent = "") {
        return 444;
    }
    
    # Block requests with suspicious user agents
    if ($http_user_agent ~* (nmap|nikto|wikto|sf|sqlmap|bsqlbf|w3af|acunetix|havij|skygrid)) {
        return 444;
    }
    
    # ==========================================================================
    # Error pages
    # ==========================================================================
    
    error_page 400 /errors/400.html;
    error_page 401 /errors/401.html;
    error_page 403 /errors/403.html;
    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/50x.html;
    
    location /errors/ {
        alias /var/www/errors/;
        internal;
    }
}