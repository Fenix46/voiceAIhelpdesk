# Promtail Configuration for VoiceHelpDeskAI Log Collection

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # VoiceHelpDeskAI Application Logs
  - job_name: voicehelpdesk-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: voicehelpdesk-app
          service: application
          environment: production
          __path__: /var/log/app/*.log

    pipeline_stages:
      # Parse JSON logs
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            module: module
            trace_id: trace_id
            user_id: user_id

      # Extract timestamp
      - timestamp:
          source: timestamp
          format: RFC3339

      # Add labels based on log level
      - labels:
          level:
          module:

      # Parse structured messages
      - regex:
          expression: '(?P<method>\w+)\s+(?P<path>/\S*)\s+(?P<status>\d+)'
          source: message

      - labels:
          method:
          status:

  # Celery Worker Logs
  - job_name: celery-worker
    static_configs:
      - targets:
          - localhost
        labels:
          job: celery-worker
          service: background-tasks
          environment: production
          __path__: /var/log/app/celery-worker*.log

    pipeline_stages:
      - regex:
          expression: '\[(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}): (?P<level>\w+)/(?P<process>\w+)\] (?P<message>.*)'

      - timestamp:
          source: timestamp
          format: '2006-01-02 15:04:05,000'

      - labels:
          level:
          process:

  # Nginx Access Logs
  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-access
          service: proxy
          environment: production
          __path__: /var/log/nginx/access.log

    pipeline_stages:
      # Parse JSON access logs
      - json:
          expressions:
            timestamp: timestamp
            remote_addr: remote_addr
            request: request
            status: status
            body_bytes_sent: body_bytes_sent
            request_time: request_time

      - timestamp:
          source: timestamp
          format: RFC3339

      - labels:
          status:

      # Extract method and path from request
      - regex:
          expression: '(?P<method>\w+)\s+(?P<path>\S+)'
          source: request

      - labels:
          method:

  # Nginx Error Logs
  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-error
          service: proxy
          environment: production
          __path__: /var/log/nginx/error.log

    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<message>.*)'

      - timestamp:
          source: timestamp
          format: '2006/01/02 15:04:05'

      - labels:
          level:

  # System Logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          service: system
          environment: production
          __path__: /var/log/*.log

    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2})\s+(?P<hostname>\S+)\s+(?P<service>\S+):\s+(?P<message>.*)'

      - timestamp:
          source: timestamp
          format: 'Jan 2 15:04:05'

      - labels:
          hostname:
          service:

  # Docker Container Logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/voicehelpdesk-(.*)'
        target_label: 'container'
        replacement: '${1}'

      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'

    pipeline_stages:
      # Parse Docker JSON logs
      - json:
          expressions:
            log: log
            stream: stream
            time: time

      - timestamp:
          source: time
          format: RFC3339Nano

      - output:
          source: log

      - labels:
          stream: